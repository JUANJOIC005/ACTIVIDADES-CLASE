services:
  my-service:
    image: fauria/vsftpd
    container_name: my_ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: user
      FTP_PASS: password
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    networks:
      - my-network

networks:
  my-network:
    name: my-custom-net
