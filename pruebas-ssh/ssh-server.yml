services:
  ssh-server:
    container_name: lab_ssh
    image: lscr.io/linuxserver/openssh-server:latest
    environment:
      - USER_NAME=ssh-user
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=password
    ports:
      - "2222:22"
    networks:
      - my-network

networks:
  my-network:
    name: my-custom-network